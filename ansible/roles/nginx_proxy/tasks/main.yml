---
- name: Install NGINX
  yum:
    name: nginx
    state: present

- name: Deploy monitoring reverse proxy config
  template:
    src: monitoring.conf.j2
    dest: /etc/nginx/conf.d/monitoring.conf
    mode: "0644"

- name: Test NGINX config
  command: nginx -t

- name: Restart NGINX
  systemd:
    name: nginx
    enabled: true
    state: restarted
